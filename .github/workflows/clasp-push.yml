name: Push Backend to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/clasp-push.yml'

jobs:
  clasp-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        env:
          CLASP_ACCESS_TOKEN: ${{ secrets.CLASP_ACCESS_TOKEN }}
          CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
          CLASP_EXPIRY_DATE: ${{ secrets.CLASP_EXPIRY_DATE }}
          CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
          CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const os = require('os');
            const path = require('path');
            const config = {
              token: {
                access_token: process.env.CLASP_ACCESS_TOKEN || '',
                refresh_token: process.env.CLASP_REFRESH_TOKEN || '',
                scope: 'https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/logging.read https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/script.webapp.deploy https://www.googleapis.com/auth/cloud-platform',
                token_type: 'Bearer',
                expiry_date: Number(process.env.CLASP_EXPIRY_DATE) || 0
              },
              oauth2ClientSettings: {
                clientId: process.env.CLASP_CLIENT_ID || '',
                clientSecret: process.env.CLASP_CLIENT_SECRET || '',
                redirectUri: 'http://localhost'
              },
              isLocalCreds: false
            };
            fs.writeFileSync(
              path.join(os.homedir(), '.clasprc.json'),
              JSON.stringify(config, null, 2)
            );
            console.log('.clasprc.json written successfully');
          "

      - name: Configure Script ID
        env:
          CLASP_SCRIPT_ID: ${{ secrets.CLASP_SCRIPT_ID }}
        run: |
          node -e "
            const fs = require('fs');
            const config = { scriptId: process.env.CLASP_SCRIPT_ID || '', rootDir: '.' };
            fs.writeFileSync('backend/.clasp.json', JSON.stringify(config, null, 2));
            console.log('.clasp.json written with scriptId:', config.scriptId ? '***' : 'EMPTY');
          "

      - name: Push to Google Apps Script
        run: |
          cd backend
          clasp push --force
