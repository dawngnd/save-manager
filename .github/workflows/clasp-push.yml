name: Push Backend to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/clasp-push.yml'

jobs:
  clasp-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: |
          cat > ~/.clasprc.json << 'EOF'
          {
            "token": {
              "access_token": "${{ secrets.CLASP_ACCESS_TOKEN }}",
              "refresh_token": "${{ secrets.CLASP_REFRESH_TOKEN }}",
              "scope": "https://www.googleapis.com/auth/script.deployments https://www.googleapis.com/auth/script.projects https://www.googleapis.com/auth/drive.metadata.readonly https://www.googleapis.com/auth/logging.read https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/script.webapp.deploy https://www.googleapis.com/auth/cloud-platform",
              "token_type": "Bearer",
              "expiry_date": ${{ secrets.CLASP_EXPIRY_DATE }}
            },
            "oauth2ClientSettings": {
              "clientId": "${{ secrets.CLASP_CLIENT_ID }}",
              "clientSecret": "${{ secrets.CLASP_CLIENT_SECRET }}",
              "redirectUri": "http://localhost"
            },
            "isLocalCreds": false
          }
          EOF

      - name: Configure Script ID
        run: |
          cat > backend/.clasp.json << EOF
          {
            "scriptId": "${{ secrets.CLASP_SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push to Google Apps Script
        run: |
          cd backend
          clasp push --force
